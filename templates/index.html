<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Outer wrapper — chat + panel side by side ── */
    #app {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 1060px;
      height: 90vh;
      align-items: flex-start;
    }

    /* ── Chat container ── */
    #chat-container {
      flex: 1;
      min-width: 0;
      height: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #chat-header {
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #chat-header .dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #chat-header .title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    /* ── Tier toggle ── */
    .tier-toggle {
      display: flex;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }

    .tier-btn {
      padding: 4px 11px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .tier-btn:hover:not(.active) { color: rgba(255,255,255,0.85); }
    .tier-btn.active { background: #fff; color: #1a1a2e; }
    .tier-btn[data-tier="premium"].active { color: #d97706; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.agent {
      background: #f0f2f5;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.agent p { margin-bottom: 8px; }
    .msg.agent p:last-child { margin-bottom: 0; }
    .msg.agent ul, .msg.agent ol { padding-left: 18px; margin-bottom: 8px; }
    .msg.agent li { margin-bottom: 2px; }

    .msg.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
      align-self: center;
      font-size: 13px;
    }

    .typing {
      background: #f0f2f5;
      color: #888;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 12px;
    }

    /* ── Input row ── */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
    }

    #user-input:focus { border-color: #1a1a2e; }

    #send-btn {
      padding: 10px 18px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      flex-shrink: 0;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ══════════════════════════════════════════════════════════
       Suggested Updates Panel
       ══════════════════════════════════════════════════════════ */
    #updates-panel {
      width: 290px;
      flex-shrink: 0;
      height: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #updates-header {
      padding: 12px 14px;
      background: #1a1a2e;
      color: #fff;
      flex-shrink: 0;
    }

    #updates-header h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #updates-header p {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }

    #updates-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Entity section (Role / Company) */
    .update-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .update-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      padding-bottom: 4px;
      border-bottom: 1px solid #f3f4f6;
    }

    /* Empty state */
    .updates-empty {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
      text-align: center;
      margin-top: 24px;
      line-height: 1.6;
      padding: 0 8px;
    }

    /* Individual field row: "Object - Field — value" */
    .update-field {
      font-size: 12px;
      color: #1a1a2e;
      line-height: 1.6;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 7px 10px;
      word-break: break-word;
    }

    .update-field-key {
      font-weight: 700;
    }

    .update-section-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
    }

    .update-section-header:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    /* ── Name modal ── */
    #name-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #name-modal.hidden { display: none; }

    #name-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    #name-box h2 { font-size: 18px; color: #1a1a2e; }
    #name-box p  { font-size: 13px; color: #6b7280; }

    #name-input {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    #name-input:focus { border-color: #1a1a2e; }

    #name-submit {
      padding: 10px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Responsive: stack vertically on small screens ── */
    @media (max-width: 720px) {
      body { align-items: flex-start; padding: 8px; }
      #app {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      #chat-container { height: 65vh; }
      #updates-panel {
        width: 100%;
        height: auto;
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>

<!-- Name prompt -->
<div id="name-modal">
  <div id="name-box">
    <h2>Welcome to Insights</h2>
    <p>What's your name? This helps personalise the conversation.</p>
    <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
    <button id="name-submit">Start chatting</button>
  </div>
</div>

<!-- ── App layout ── -->
<div id="app">

  <!-- Chat -->
  <div id="chat-container">
    <div id="chat-header">
      <div class="dot"></div>
      <span class="title">Insights Agent</span>
      <div class="tier-toggle" id="tier-toggle">
        <button class="tier-btn" data-tier="free">Free</button>
        <button class="tier-btn" data-tier="pro">Pro</button>
        <button class="tier-btn" data-tier="premium">Premium</button>
      </div>
    </div>

    <div id="messages"></div>

    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Type a message…" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <!-- Suggested Updates Panel -->
  <div id="updates-panel">
    <div id="updates-header">
      <h3>Suggested Updates</h3>
      <p>What we'd write to the database — not saved yet</p>
    </div>
    <div id="updates-body"></div>
  </div>

</div><!-- #app -->

<script>
  marked.setOptions({ breaks: true, gfm: true });

  // ── Identity ──────────────────────────────────────────────────────────────
  let userId   = localStorage.getItem("insights_user_id");
  let userName = localStorage.getItem("insights_user_name");
  let mode     = localStorage.getItem("insights_mode") || "premium";

  if (!userId) {
    userId = "u_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("insights_user_id", userId);
  }

  const modal      = document.getElementById("name-modal");
  const nameInput  = document.getElementById("name-input");
  const nameSubmit = document.getElementById("name-submit");
  const messages   = document.getElementById("messages");
  const input      = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const tierToggle = document.getElementById("tier-toggle");
  const updatesPanel = document.getElementById("updates-panel");
  const updatesBody  = document.getElementById("updates-body");

  // ── Tier toggle ───────────────────────────────────────────────────────────
  function applyMode(m) {
    mode = m;
    localStorage.setItem("insights_mode", mode);
    document.querySelectorAll(".tier-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tier === mode);
    });
  }

  applyMode(mode);

  tierToggle.addEventListener("click", e => {
    const btn = e.target.closest(".tier-btn");
    if (!btn || btn.dataset.tier === mode) return;
    applyMode(btn.dataset.tier);
    messages.innerHTML = "";
    clearUpdatesPanel();
    startConversation();
  });

  // Show empty state immediately so panel is never blank
  showEmptyState();

  // ── Name modal ────────────────────────────────────────────────────────────
  if (userName) {
    modal.classList.add("hidden");
    startConversation();
  } else {
    nameInput.focus();
  }

  nameSubmit.addEventListener("click", submitName);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") submitName(); });

  function submitName() {
    const n = nameInput.value.trim();
    if (!n) return;
    userName = n;
    localStorage.setItem("insights_user_name", userName);
    modal.classList.add("hidden");
    startConversation();
  }

  // ── Suggested Updates Panel ───────────────────────────────────────────────

  // Field display names and ordering
  const ROLE_FIELD_LABELS = {
    "Find":         "How to Get In",
    "Notes":        "Role Notes",
    "Region":       "Location",
    "Compensation": "Compensation",
  };

  const COMPANY_FIELD_LABELS = {
    "Confidential Notes": "Confidential Notes",
  };

  // Labels for newly-added entities (distinct from updates to existing records)
  const NEW_ROLE_FIELD_LABELS = {
    "Title":   "Title",
    "Company": "Company",
    "Find":    "How to Get In",
    "Notes":   "Role Notes",
  };

  const NEW_COMPANY_FIELD_LABELS = {
    "Company Name": "Company Name",
    "Domain Dirty": "Domain",
  };

  function clearUpdatesPanel() {
    updatesBody.innerHTML = "";
    showEmptyState();
  }

  function showEmptyState() {
    updatesBody.innerHTML = "";
    const empty = document.createElement("div");
    empty.className = "updates-empty";
    empty.textContent = "Suggested updates will appear here as the conversation collects new information.";
    updatesBody.appendChild(empty);
  }

  // Render each update as "Object - Field Name — value" with object+field bolded
  function renderUpdatesPanel(updates) {
    if (!updates || typeof updates !== "object") return;

    const roleName      = updates.role_name    || "Role";
    const companyName   = updates.company_name || "Company";
    const roleFields    = updates.role         || {};
    const companyFields = updates.company      || {};
    const newRoleFields    = updates.new_role    || {};
    const newCompanyFields = updates.new_company || {};

    const hasRole       = Object.values(roleFields).some(Boolean);
    const hasCompany    = Object.values(companyFields).some(Boolean);
    const hasNewRole    = Object.values(newRoleFields).some(Boolean);
    const hasNewCompany = Object.values(newCompanyFields).some(Boolean);

    if (!hasRole && !hasCompany && !hasNewRole && !hasNewCompany) return;

    updatesBody.innerHTML = "";

    // ── Updates to existing records ──────────────────────────────────
    for (const [field, label] of Object.entries(ROLE_FIELD_LABELS)) {
      const value = roleFields[field];
      if (!value) continue;
      const key = `Role - ${roleName} / ${companyName} - ${label}`;
      updatesBody.appendChild(makeFieldRow(key, value));
    }

    for (const [field, label] of Object.entries(COMPANY_FIELD_LABELS)) {
      const value = companyFields[field];
      if (!value) continue;
      const key = `Company - ${companyName} - ${label}`;
      updatesBody.appendChild(makeFieldRow(key, value));
    }

    // ── New additions ────────────────────────────────────────────────
    if (hasNewRole) {
      const header = document.createElement("div");
      header.className = "update-section-header";
      header.textContent = "New Role";
      updatesBody.appendChild(header);
      for (const [field, label] of Object.entries(NEW_ROLE_FIELD_LABELS)) {
        const value = newRoleFields[field];
        if (!value) continue;
        updatesBody.appendChild(makeFieldRow(label, value));
      }
    }

    if (hasNewCompany) {
      const header = document.createElement("div");
      header.className = "update-section-header";
      header.textContent = "New Company";
      updatesBody.appendChild(header);
      for (const [field, label] of Object.entries(NEW_COMPANY_FIELD_LABELS)) {
        const value = newCompanyFields[field];
        if (!value) continue;
        updatesBody.appendChild(makeFieldRow(label, value));
      }
    }
  }

  // Bold key, plain value: "**Key** — value"
  function makeFieldRow(key, value) {
    const row = document.createElement("div");
    row.className = "update-field";

    const keySpan = document.createElement("span");
    keySpan.className = "update-field-key";
    keySpan.textContent = key;

    row.appendChild(keySpan);
    row.appendChild(document.createTextNode(` — ${value}`));
    return row;
  }

  // ── Messaging ─────────────────────────────────────────────────────────────
  function appendMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    if (role === "agent") {
      div.innerHTML = marked.parse(text);
      div.querySelectorAll("a").forEach(a => {
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
      });
    } else {
      div.textContent = text;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.textContent = "Insights agent is thinking…";
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function enableChat() {
    input.disabled   = false;
    sendBtn.disabled = false;
    input.focus();
  }

  async function fetchWithRetry(url, options, maxAttempts = 4) {
    for (let attempt = 1; attempt <= maxAttempts; attempt++) {
      try {
        const res = await fetch(url, options);
        // 500 = application error (e.g. Claude API failure) — return immediately so
        // the caller can read the error body and show a meaningful message.
        // Only retry on 502/503/504 which mean the server itself is unavailable.
        if (res.ok || res.status === 500 || res.status < 500) return res;
        if (attempt < maxAttempts) await new Promise(r => setTimeout(r, 2 ** attempt * 500));
      } catch (err) {
        if (attempt < maxAttempts) await new Promise(r => setTimeout(r, 2 ** attempt * 500));
        else throw err;
      }
    }
    throw new Error("Server unavailable after retries");
  }

  async function startConversation() {
    showEmptyState();
    showTyping();
    try {
      const res = await fetchWithRetry("/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName, mode }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply || data.error || "No response.", "agent");
      enableChat();
    } catch (err) {
      removeTyping();
      appendMsg("Could not reach the server. Please check your connection and refresh.", "error");
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    appendMsg(text, "user");
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetchWithRetry("/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName, text, mode }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply || data.error || "No response.", res.ok ? "agent" : "error");

      // Update the suggested-updates panel if the server returned updates
      if (data.suggested_updates) {
        renderUpdatesPanel(data.suggested_updates);
      }
    } catch (err) {
      removeTyping();
      appendMsg("Could not reach the server. Please check your connection and try again.", "error");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
