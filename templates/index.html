<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #chat-header {
      padding: 14px 20px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #chat-header .dot {
      width: 9px; height: 9px;
      background: #4ade80;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #chat-header .title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      user-select: none;
    }

    .mode-toggle .toggle-track {
      position: relative;
      width: 44px;
      height: 22px;
      background: rgba(255,255,255,0.15);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .mode-toggle .toggle-track.on {
      background: #f59e0b;
    }

    .mode-toggle .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .mode-toggle .toggle-track.on .toggle-thumb {
      transform: translateX(22px);
    }

    .mode-toggle .label-premium { color: #f59e0b; font-weight: 700; }
    .mode-toggle .label-basic   { color: rgba(255,255,255,0.5); }
    .mode-toggle.basic-active .label-premium { color: rgba(255,255,255,0.5); font-weight: 500; }
    .mode-toggle.basic-active .label-basic   { color: #fff; font-weight: 700; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* Agent messages render markdown */
    .msg.agent {
      background: #f0f2f5;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.agent h1, .msg.agent h2, .msg.agent h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .msg.agent p { margin-bottom: 8px; }
    .msg.agent p:last-child { margin-bottom: 0; }
    .msg.agent ul, .msg.agent ol { padding-left: 18px; margin-bottom: 8px; }
    .msg.agent li { margin-bottom: 2px; }
    .msg.agent strong { font-weight: 700; }
    .msg.agent em { font-style: italic; }

    .msg.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
      align-self: center;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .typing {
      background: #f0f2f5;
      color: #888;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 12px;
    }

    /* ── Input row ── */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
    }

    #user-input:focus { border-color: #1a1a2e; }

    #send-btn {
      padding: 10px 18px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      flex-shrink: 0;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Name modal ── */
    #name-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #name-modal.hidden { display: none; }

    #name-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    #name-box h2 { font-size: 18px; color: #1a1a2e; }
    #name-box p  { font-size: 13px; color: #6b7280; }

    #name-input {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    #name-input:focus { border-color: #1a1a2e; }

    #name-submit {
      padding: 10px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Name prompt -->
<div id="name-modal">
  <div id="name-box">
    <h2>Welcome to Insights</h2>
    <p>What's your name? This helps personalise the conversation.</p>
    <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
    <button id="name-submit">Start chatting</button>
  </div>
</div>

<!-- Chat UI -->
<div id="chat-container">
  <div id="chat-header">
    <div class="dot"></div>
    <span class="title">Insights Agent</span>

    <!-- Premium / Basic toggle -->
    <div class="mode-toggle" id="mode-toggle">
      <span class="label-premium">Premium</span>
      <div class="toggle-track" id="toggle-track">
        <div class="toggle-thumb"></div>
      </div>
      <span class="label-basic">Basic</span>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message…" disabled></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  // ── Configure marked.js ───────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── Identity ──────────────────────────────────────────────────────────────
  let userId   = localStorage.getItem("insights_user_id");
  let userName = localStorage.getItem("insights_user_name");
  let mode     = localStorage.getItem("insights_mode") || "premium";

  if (!userId) {
    userId = "u_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("insights_user_id", userId);
  }

  const modal      = document.getElementById("name-modal");
  const nameInput  = document.getElementById("name-input");
  const nameSubmit = document.getElementById("name-submit");
  const messages   = document.getElementById("messages");
  const input      = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const modeToggle = document.getElementById("mode-toggle");
  const toggleTrack = document.getElementById("toggle-track");

  // ── Mode toggle ───────────────────────────────────────────────────────────
  function applyMode(m) {
    mode = m;
    localStorage.setItem("insights_mode", mode);
    if (mode === "basic") {
      toggleTrack.classList.add("on");
      modeToggle.classList.add("basic-active");
    } else {
      toggleTrack.classList.remove("on");
      modeToggle.classList.remove("basic-active");
    }
  }

  applyMode(mode);

  toggleTrack.addEventListener("click", () => {
    const newMode = mode === "premium" ? "basic" : "premium";
    applyMode(newMode);
    // Restart conversation in the new mode
    messages.innerHTML = "";
    startConversation();
  });

  // ── Name modal ────────────────────────────────────────────────────────────
  if (userName) {
    modal.classList.add("hidden");
    startConversation();
  } else {
    nameInput.focus();
  }

  nameSubmit.addEventListener("click", submitName);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") submitName(); });

  function submitName() {
    const n = nameInput.value.trim();
    if (!n) return;
    userName = n;
    localStorage.setItem("insights_user_name", userName);
    modal.classList.add("hidden");
    startConversation();
  }

  // ── Messaging ─────────────────────────────────────────────────────────────
  function appendMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    if (role === "agent") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.textContent = "Insights agent is thinking…";
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function enableChat() {
    input.disabled   = false;
    sendBtn.disabled = false;
    input.focus();
  }

  async function startConversation() {
    showTyping();
    try {
      const res = await fetch("/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName, mode }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply || data.error || "No response.", "agent");
      enableChat();
    } catch (err) {
      removeTyping();
      appendMsg("Could not reach the server. Please refresh.", "error");
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    appendMsg(text, "user");
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName, text, mode }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply || data.error || "No response.", "agent");
    } catch (err) {
      removeTyping();
      appendMsg("Could not reach the server. Please refresh.", "error");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
