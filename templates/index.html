<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chat-header .dot {
      width: 10px; height: 10px;
      background: #4ade80;
      border-radius: 50%;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.agent {
      background: #f0f2f5;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
      align-self: center;
      font-size: 13px;
    }

    .typing {
      background: #f0f2f5;
      color: #888;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 13px;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
    }

    #user-input:focus { border-color: #1a1a2e; }

    #send-btn {
      padding: 10px 18px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
    }

    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #name-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #name-modal.hidden { display: none; }

    #name-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    #name-box h2 { font-size: 18px; color: #1a1a2e; }
    #name-box p  { font-size: 13px; color: #6b7280; }

    #name-input {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    #name-input:focus { border-color: #1a1a2e; }

    #name-submit {
      padding: 10px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Name prompt -->
<div id="name-modal">
  <div id="name-box">
    <h2>Welcome to Insights</h2>
    <p>What's your name? This helps personalise the conversation.</p>
    <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
    <button id="name-submit">Start chatting</button>
  </div>
</div>

<!-- Chat UI -->
<div id="chat-container">
  <div id="chat-header">
    <div class="dot"></div>
    Insights Agent
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message…" disabled></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  // ── identity ──────────────────────────────────────────────────────────────
  let userId   = localStorage.getItem("insights_user_id");
  let userName = localStorage.getItem("insights_user_name");

  if (!userId) {
    userId = "u_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("insights_user_id", userId);
  }

  const modal      = document.getElementById("name-modal");
  const nameInput  = document.getElementById("name-input");
  const nameSubmit = document.getElementById("name-submit");
  const messages   = document.getElementById("messages");
  const input      = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  function enableChat() {
    input.disabled   = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── name modal ────────────────────────────────────────────────────────────
  if (userName) {
    modal.classList.add("hidden");
    startConversation();
  } else {
    nameInput.focus();
  }

  nameSubmit.addEventListener("click", submitName);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") submitName(); });

  function submitName() {
    const n = nameInput.value.trim();
    if (!n) return;
    userName = n;
    localStorage.setItem("insights_user_name", userName);
    modal.classList.add("hidden");
    startConversation();
  }

  // ── messaging ─────────────────────────────────────────────────────────────
  function appendMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "msg typing";
    div.id = "typing-indicator";
    div.textContent = "Insights agent is thinking…";
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function startConversation() {
    showTyping();
    try {
      const res = await fetch("/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply, "agent");
      enableChat();
    } catch (err) {
      removeTyping();
      appendMsg("Could not reach the server. Please refresh.", "error");
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    appendMsg(text, "user");
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, user_name: userName, text }),
      });
      const data = await res.json();
      removeTyping();
      appendMsg(data.reply || data.error, "agent");
    } catch (err) {
      removeTyping();
      appendMsg("Something went wrong. Please try again.", "error");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // auto-grow textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
